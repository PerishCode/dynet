[package]
name = "dynet-cli"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Installable dynet proxy CLI skeleton."

[dependencies]
dynet-core = { path = "../dynet-core" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = "0.3"

[[bin]]
name = "dynet"
path = "src/main.rs"
